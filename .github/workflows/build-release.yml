name: Build & Release

on:
  release:
    types: [published]

env:
  FLUTTER_VERSION: "3.19.x"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Tests — Run before any distribution
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Analyzer
        run: flutter analyze

      - name: Run Tests
        run: flutter test

  # ─────────────────────────────────────────────────────────────────
  # 2. Android — Build & Distribute to Play Store Internal Track
  # ─────────────────────────────────────────────────────────────────
  android:
    name: Android Release
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          APP_ENV: "production"
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY" >> .env
          echo "RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID" >> .env
          echo "RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET" >> .env
          echo "SENTRY_DSN=$SENTRY_DSN" >> .env
          echo "APP_ENV=$APP_ENV" >> .env

      - name: Decode Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Build Android App Bundle & APK
        env:
          KEYSTORE_PATH: "../upload-keystore.jks"
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release --dart-define-from-file=".env"
          flutter build apk --release --split-per-abi --dart-define-from-file=".env"

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Distribute via Fastlane (Android)
        working-directory: android
        env:
          SUPPLY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane android internal_release

  # ─────────────────────────────────────────────────────────────────
  # 3. iOS — Build & Distribute to TestFlight
  # ─────────────────────────────────────────────────────────────────
  ios:
    name: iOS Release
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          APP_ENV: "production"
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY" >> .env
          echo "RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID" >> .env
          echo "RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET" >> .env
          echo "SENTRY_DSN=$SENTRY_DSN" >> .env
          echo "APP_ENV=$APP_ENV" >> .env

      - name: Import iOS Certificates (via Fastlane Match)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios
          bundle exec fastlane ios fetch_certificates

      - name: Build iOS Archive
        run: |
          flutter build ipa --release --export-method app-store --dart-define-from-file=".env"

      - name: Distribute via Fastlane (iOS/TestFlight)
        working-directory: ios
        env:
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_KEY_P8: ${{ secrets.APPLE_KEY_P8 }}
        run: bundle exec fastlane ios testflight
